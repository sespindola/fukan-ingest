nats:
  url: nats://localhost:4222

clickhouse:
  addr: localhost:9000
  database: fukan
  user: default
  password: ""

redis:
  url: redis://localhost:6379/0

# MaxMind GeoLite2 databases consumed by the BGP worker. Download both
# from https://www.maxmind.com (free account required). BGP worker fails
# to start if either file is missing or unreadable.
#   city_db → prefix → (lat, lon) at city-level precision
#   asn_db  → prefix → registered holder ASN + org name (for hijack UX)
geoip:
  city_db: /var/lib/geoip/GeoLite2-City.mmdb
  asn_db:  /var/lib/geoip/GeoLite2-ASN.mmdb

integrations:
  adsb:
    - name: opensky
      api_url: https://opensky-network.org/api/states/all
      interval: 10  # seconds (10s anon / 5s authenticated)
      # OpenSky OAuth2 credentials (optional, for authenticated access).
      # Register at https://opensky-network.org/my-opensky/account
      # Also used by `refresh --target airlines` for CSV download.
      client_id: your-client-id
      client_secret: your-client-secret
    # - name: adsb_exchange
    #   api_url: http://another-adsb-feed
    #   api_key: YOUR_API_KEY
    #   interval: 2
  ais:
    - name: aisstream
      api_url: wss://stream.aisstream.io/v0/stream
      api_key: YOUR_AISSTREAM_API_KEY
  tle:
    - name: celestrak
      api_url: https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=json
      interval: 7200  # 2 hours
    - name: classfd
      api_url: https://mmccants.org/tles/classfd.zip
      interval: 21600  # 6 hours
  bgp:
    # RIPE NCC RIS Live real-time BGP stream. No API key required.
    # Worker filters the firehose to high-signal events only:
    # hijack (origin change), leak (Tier-1 downstream of non-Tier-1),
    # withdrawal of known prefix, new-prefix announcement.
    - name: ris-live
      api_url: wss://ris-live.ripe.net/v1/ws/?client=fukan-ingest
